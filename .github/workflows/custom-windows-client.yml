name: Build custom Windows client

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.296.0
          cache: true

      - name: Configure release build
        run: cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=Release -DEXCEPTION_HANDLING=ON -DVULKAN=ON

      - name: Build and package client
        run: cmake --build build --config Release --target package_default

      - name: Upload Windows client
        uses: actions/upload-artifact@v4
        with:
          name: my-ddnet-client-windows
          path: build/*-win64.zip
          if-no-files-found: error
